name: PR Workflow

on:
  pull_request:
    branches: [development, release-*]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  run_tests:
    uses: nepalevov/ci/.github/workflows/node_pr.yml@main
    secrets: inherit
    with:
      node-version: "24"
      maximize-build-space: false
      ort-enabled: false
      trivy-enabled: false

